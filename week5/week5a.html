<DOCTYPE html>
<html>
<head>
    <title>card layout</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            
        }
        .container{
            font-size: large;
            text-align: center;
            display: flex;
            gap: 20px;
            margin-top: 50px;



        }
        .card{
            background-color: white;
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-align: center;

        }
    </style>

</head>
<body>
    <div class="container">
        <div class="card">
            <img src="vk.jpg">
            <h3>KOHLI</h3>
            <p>chikku's fan click here</p>
            <button>click me</button>

        </div>
        <div class="card">
            <img src="https://wallpaper-house.com/data/out/9/wallpaper2you_339897.jpg">
            <h3>DHONI</h3>
            <p>mahi's fan click here</p>
            <button>click me</button>
        </div>
        <div class="card">
            <h3>ROHIT</h3>
            <p>SHARMA's fan click here</p>
            <button>click me</button>
        </div>
    </div>
</body>
