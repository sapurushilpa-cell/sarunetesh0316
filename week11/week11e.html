<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image: url("spac1.png");
            background-size: cover;
            height:100vh;
            color: white;
            font-family: cursive;
            font-size: large;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 0px;
        } 
        div{
            width: 300px;
            height: fit-content;
            box-sizing: border-box;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px) brightness(100%);
            background: linear-gradient(120deg,rgba(255,255,255,0.2),rgba(0,0,0,0.3));

        }
        div p{
            text-align: left;
            color: rgba(255,255,255,0.8);
        }
        div h3{
            text-align: center;
        }
        input{
            width: 250px;
            padding: 5px;
            background-color: rgba(255,255,255,0.2);
            border: none;
            border-bottom: solid rgba(255,255,255,0.6) 2px;
            border-radius: 5px;
            outline: none;
        }
        .valid{
            border-bottom: solid green 2px;
        }
        .invalid{
                border-bottom: solid red 2px;
        
        }
        button{
            width: 200px;
            padding: 8px;
            border-radius: 30px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(2px) brightness(90%);
            border: solid rgba(128, 128, 128,0.3);
            margin: 20px;
            color: rgba(255, 255, 255, 0.719);
        }
        button:hover{
            border-color:rgba(240, 248, 255, 0.532);
        }
    </style>
</head>
<body>
    <div>
        <form action="">
            <h3>Registration</h3>
            <p>Name</p>
            <input type="text" id="name" placeholder="Enter your name">
            <p>Email</p>
            <input type="text" id="email" placeholder="Enter email address">
            <p>Mobile Number</p>
            <input type="text" id="number" placeholder="Enter mobile number">
            <button type="submit">register</button>
            </form>
    </div>
    <script>

        let form = document.querySelector('form');
        form.addEventListener('submit', function(event){
            event.preventDefault();
            let name = document.getElementById("name")
            let email = document.getElementById("email")
            let number = document.getElementById("number")
            if(validate_name(name) && validate_email(email) && validate_number(number)){
                alert("thank you for submitting")
                form.submit();
            }
        })
         function validate_number(number){
            let num_pattern = /^[0-9]{10}$/;
            if(number.value.match(num_pattern)){
                number.classList.remove('invalid');
                number.classList.add('valid');
                return true;
            }
            number.classList.remove('valid');
            number.classList.add('invalid');
            return false;
        }
        function validate_email(email){
            let pattern = /^[a-zA-Z0-9._]+@[a-zA-Z0-9]+\.[a-z]{2,4}$/;
            if(email.value.match(pattern)){
                email.classList.remove('invalid');
                email.classList.add('valid');
                return true;
            }
            email.classList.remove('valid');
            email.classList.add('invalid');
            return false;
        }
        function validate_name(name){
            let pattern=/[A-Za-z]/
            if(name.value.match(pattern)){
                name.classList.remove('invalid');
                name.classList.add('valid');
                return true;
            }
            name.classList.remove('valid');
            name.classList.add('invalid');
            return false;
        }
    </script>

    
</body>
</html>
