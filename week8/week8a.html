<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-image:url(45+\ Bleu\ pastel\ Wallpapers\ _\ Free\ download\ _\ Best\ Collection.jpg);
                background-position:center;
                background-size:cover;
                background-repeat:no-repeat;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                margin: 5px;;
            }
            .container{
                text-align:center;
                display:flex;
                justify-content:center;
                align-items:center;
                gap:30px;
                flex-direction:column;
            }
            .square{
                width:300px;
                height:300px;
                background-color:red;
                position:relative;
                animation-name:myanimation;
                animation-delay:2s;
                animation-duration:7s;
                animation-iteration-count:infinite;
                margin-top:20px;

            }
            @keyframes myanimation{
                0%{lft:0px;top:0px;transform:rotate(0deg);}
                100% {lft:0px;top:0px;transform:rotate(360deg);}
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 style="font-style: italic;color:gold;font-size:xx-large;">Infinite Rotating Square</h1>
            <p style="font-size:x-large">Watch the square spin continously with smooth animation</p>
            <p style="font-size:x-large">This square rotates 360 degrees continuosly using CSS animation.It shows how we can create smooth
                 motion effects on webpages</p>
            <div class="square"></div>
        </div>
        
    </body>
</html>
